<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Cortes IA</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

.header {
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: #1c1c1c;
    border-radius: 12px;
    overflow: hidden;
    padding: 10px;
}

.row {
    display: flex;
    gap: 5px;
}

.row img {
    width: 33%;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
}

.info {
    font-size: 12px;
    color: #aaa;
    margin-top: 8px;
}

.actions {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
}

button {
    padding: 5px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #333;
    color: white;
}

button:hover {
    background: #555;
}
</style>
</head>

<body>

<div class="header">💈 Panel de Cortes IA</div>

<div class="grid">

{% for item in data %}

<div class="card">

    <div class="row">
        <img src="{{ item.original }}">
        <img src="{{ item.corte }}">
        <img src="{{ item.resultado }}">
    </div>

    <div class="info">📅 {{ item.fecha }}</div>

    <div class="actions">
        <a href="{{ item.resultado }}" target="_blank">
            <button>Ver</button>
        </a>

        <a href="{{ item.resultado }}" download>
            <button>Descargar</button>
        </a>
    </div>

</div>

{% endfor %}

</div>

</body>
</html>
